name: deploy
on:
  push:
    branches: [ "main" ]  # Trigger on push to main branch
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest  # Use Ubuntu virtual machine
    
    steps:
    # Download repository code to the runner
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    # Set up SSH authentication
    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh  # Create .ssh directory
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa  # Write private key to file
        chmod 600 ~/.ssh/id_rsa  # Set correct permissions (owner read/write only)
      env:
        SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}  # Load secret from GitHub
    
    # Copy files to server using rsync
    - name: Deploy to Server
      run: |
        rsync -avz --delete \
          -e "ssh -o StrictHostKeyChecking=no" \
          --exclude='.git' \
          --exclude='.github' \
          ./ \
          cs2team3@cs2410-web01pvm.aston.ac.uk:/home/cs2team3/public_html/
